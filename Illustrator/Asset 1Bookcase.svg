<?xml version="1.0" encoding="UTF-8"?>
<svg id="Layer_2" data-name="Layer 2" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 792 612">
  <defs>
    <style>
      .vi    { font-family: FuturaPT-Heavy,'Futura PT'; font-weight: 800; font-size: 6px; }
      .title { font-family: TheSeasons-Regular,'The Seasons'; font-size: 33px; }
      .sub   { font-family: FuturaPT-Book,'Futura PT'; font-size: 7px; }
      .bay   { font-family: FuturaPT-Bold,'Futura PT'; font-weight: 700; font-size: 7.5px; }
      .role  { font-family: FuturaPT-Heavy,'Futura PT'; font-weight: 800; font-size: 5.8px; }
      .sname { font-family: FuturaPT-Heavy,'Futura PT'; font-weight: 800; font-size: 9px; }
      .shex  { font-family: FuturaPT-Bold,'Futura PT'; font-weight: 700; font-size: 7.5px; }
    </style>

    <!-- bloom colophon, debossed (black drop + white lift) -->
    <g id="bloomArt" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M-8 4 L0 6 L0 1 L-8 -1 Z"/>
      <path d="M8 4 L0 6 L0 1 L8 -1 Z"/>
      <path d="M0 1 L0 -5"/>
      <path d="M0 -3 C-5 -4 -7 -7 -6 -11 C-2 -10 0 -7 0 -5"/>
      <path d="M0 -3 C5 -4 7 -7 6 -11 C2 -10 0 -7 0 -5"/>
      <circle cx="0" cy="-9.4" r="1.5"/>
    </g>
    <g id="bloom">
      <use xlink:href="#bloomArt" transform="translate(0 0.5)" stroke="#000000" stroke-opacity=".24" stroke-width="1"/>
      <use xlink:href="#bloomArt" transform="translate(0 -0.5)" stroke="#ffffff" stroke-opacity=".18" stroke-width="1"/>
    </g>

    <linearGradient id="floorShade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0"/><stop offset="1" stop-color="#000000" stop-opacity=".22"/>
    </linearGradient>
  </defs>

  <g id="Layer_1-2" data-name="Layer 1">

    <rect width="792" height="612" fill="#fbf8f3"/>

    <!-- header -->
    <text class="vi" x="396" y="26" text-anchor="middle" fill="#9a9088" letter-spacing="2">VISUAL IDENTITY</text>
    <text class="title" x="40" y="80" fill="#2b2622">The Colour Library</text>
    <text class="sub" x="752" y="74" text-anchor="end" fill="#6b6258" letter-spacing="0.6">Two shelves, ten volumes · light &amp; dark</text>
    <rect x="40" y="92" width="712" height="1" fill="#2b2622" opacity=".12"/>

    <!-- ============ BOOKCASE ============ -->
    <!-- carcass -->
    <rect x="40" y="104" width="712" height="452" rx="5" fill="#34281d"/>
    <rect x="40" y="104" width="712" height="11" fill="#3f3023"/>
    <rect x="40" y="113" width="712" height="2" fill="#241a12"/>
    <!-- bay backs -->
    <rect x="54" y="116" width="330" height="420" fill="#f3ede3"/>
    <rect x="408" y="116" width="330" height="420" fill="#201811"/>
